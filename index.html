<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1 class="text-center">Operation Perfomer</h1>
    <div class="container-fluid d-flex bg-primary p-3">
      <div
        class="card shadow-none p-3 bg-light rounded"
        style="width: 27rem height=20px"
      >
        <div class="card-body">
          <h2 class="card-title text-center">Factorial App</h2>
          <label for="floatingInput"
            >Enter the number for finding factorial
          </label>
          <div class="form-floating mb-3">
            <input
              type="number"
              class="form-control"
              id="Input"
              placeholder="Enter the number"
            />
          </div>
          <label for="output">Output</label>
          <div class="form-floating mb-3">
            <input type="number" class="form-control" id="output" />
          </div>

          <a href="#" class="btn btn-primary" id="submit">Find Factorial</a>
          <a href="#" class="btn btn-danger" id="clear">Clear</a>
        </div>
      </div>
      <div
        class="card shadow-none p-3 bg-light rounded ms-4"
        style="width: 27rem height=20px"
      >
        <div class="card-body">
          <h2 class="card-title text-center">Sum App</h2>
          <label for="floatingInput">Enter the first number </label>
          <div class="form-floating mb-3">
            <input
              type="number"
              class="form-control"
              id="first-no"
              placeholder="Enter the number"
            />
          </div>
          <label for="floatingInput">Enter the second number </label>
          <div class="form-floating mb-3">
            <input
              type="number"
              class="form-control"
              id="second-no"
              placeholder="Enter the number"
            />
          </div>
          <label for="output">Output</label>
          <div class="form-floating mb-3">
            <input type="number" class="form-control" id="sum-out" />
          </div>

          <a href="#" class="btn btn-primary" id="sum">Get Sum</a>
          <a href="#" class="btn btn-danger" id="clear-sum">Clear</a>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
